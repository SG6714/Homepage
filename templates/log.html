<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shane Guignard – Visitor Log</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
        body {
            font-family: 'Press Start 2P', 'VT323', monospace;
            background-color: #000000;
            color: #00ff00;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00;
            line-height: 1.2;
            font-size: 14px;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 20px;
            box-shadow: 0 0 15px #00ff00, inset 0 0 15px #00ff00;
            max-width: 900px;
            margin: 20px auto;
            position: relative;
        }
        h1 {
            color: #00ff00;
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.8em;
            border-bottom: 2px dashed #00ff00;
            padding-bottom: 10px;
        }
        h2 {
            color: #00ff00;
            text-transform: uppercase;
            margin-top: 25px;
            margin-bottom: 10px;
            border-bottom: 1px dotted #00ff00;
            padding-bottom: 5px;
        }
        .terminal {
            background-color: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ff00;
            padding: 15px;
            margin-top: 20px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            min-height: 100px;
            overflow-y: auto;
            max-height: 600px;
            font-size: 0.95em;
        }
        pre.terminal-output {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #00ff00;
        }
        .prompt {
            color: #ffff00;
            margin-right: 5px;
        }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1em;
            background-color: #00ff00;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            from, to { background-color: transparent; }
            50% { background-color: #00ff00; }
        }
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.2;
        }
        a {
            color: #00ff00;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        body *:not(input):not(button):not(h1):not(h2) {
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.7);
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="container">
        <h1>[ Visitor Log ]<span class="cursor"></span></h1>
        <p><a href="/"><span class="prompt">&lt;</span> Back to terminal</a></p>

        <h2>Access History</h2>
        <div class="terminal">
            {% if log_content %}
                <pre class="terminal-output">{{ log_content | e }}</pre>
            {% else %}
                <p>(No visitor log entries yet.)</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
